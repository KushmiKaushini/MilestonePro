name: milestone_pro
description: "Milestone Pro — A premium, high-performance goal tracking system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Notifications & Alarms
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # UI & Aesthetics
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
