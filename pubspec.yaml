name: milestone_pro
description: "Milestone Pro — A high-performance multi-platform goal tracking system"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  isar: ^4.0.0-dev.14
  isar_flutter_libs: ^4.0.0-dev.14
  path_provider: ^2.1.5

  # Notifications & Alarms
  flutter_local_notifications: ^21.0.0
  android_alarm_manager_plus: ^5.0.0
  permission_handler: ^12.0.0+1
  timezone: ^0.11.0

  # Charts & UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  animate_do: ^3.3.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^4.0.0-dev.14

flutter:
  uses-material-design: true
